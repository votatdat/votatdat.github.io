{% if site.fb_comment_id %}
<div class="comments">
  <div id="fb-root"></div>
  <script>
    (function (d, s, id) {
      var js,
        fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) return;
      js = d.createElement(s);
      js.id = id;
      js.src =
        "https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v8.0&appId={{ site.fb_comment_id }}&autoLogAppEvents=1";
      fjs.parentNode.insertBefore(js, fjs);
    })(document, "script", "facebook-jssdk");
  </script>
  <div
    class="fb-comments"
    {%
    comment
    %}
    data-href="{{ page.url | absolute_url }}"
    {%
    endcomment
    %}
    data-href="https://votatdat.github.io/2020-09-04-DRF-Tutorial-01/"
    data-width="100%"
    data-numposts="1000"
  ></div>
  <noscript>
    Please enable JavaScript to view the comments powered by Facebook.
  </noscript>
</div>
{% endif %}
